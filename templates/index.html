<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Countries</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        .header {
            background: #007bff;
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            padding: 2rem;
        }
        .country-card {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .country-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        .country-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .country-card h2 {
            padding: 1rem;
            margin: 0;
            color: #333;
            text-align: center;
        }
        .country-card button {
            display: block;
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
        }
        .country-card button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Explore Countries</h1>
    </div>
    <div class="country-grid">
        {% for country in countries %}
            <div class="country-card">
                <img src="data:image/jpeg;base64,{{ country[2] | b64encode }}" alt="{{ country[1] }}">
                <h2>{{ country[1] }}</h2>
                <button onclick="window.location.href='/country/{{ country[0] }}'">View Cities</button>
            </div>
        {% endfor %}
    </div>
</body>
</html>
