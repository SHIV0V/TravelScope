<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            background-color: black;
        }

        /* Background Video */
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
        }

        nav {
            position: relative;
            z-index: 10;
            padding: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        
        .logo {
            color: white;
            font-size: 1.7rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-items {
            display: flex;
            gap: 2rem;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .nav-item:hover {
            color: #f0f0f0;
        }

        main {
            position: relative;
            z-index: 10;
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h2 {
            color: white;
            font-size: 3.75rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        .cta-button {
            background-color: white;
            color: black;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .cta-button:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        /* Support Widget */
        .support-widget {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background-color: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .support-widget:hover {
            background-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            h2 {
                font-size: 2.5rem;
            }

            .nav-items {
                gap: 1rem;
            }

            .support-widget {
                bottom: 5rem;
                right: 50%;
                transform: translateX(50%);
            }
        }
    </style>
</head>
<body>
    <!-- Background Video -->
    <video autoplay muted loop class="background-video">
        <source src="{{ url_for('static', filename='videos/bg.mp4') }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="overlay"></div>

    <nav>
        <div class="container">
            <a href="#" class="logo">TravelScope</a>
            <div class="nav-items">
                <a href="{{ url_for('weather') }}" class="nav-item">Weather</a>
                <a href="{{ url_for('map_page') }}" class="nav-item">Map</a>
                <a href="{{ url_for('travel') }}" class="nav-item">Travel</a>
                <a href="{{ url_for('hotel') }}" class="nav-item">Hotel</a>
                <a href="{{ url_for('top') }}" class="nav-item">List</a>
            </div>
        </div>
    </nav>

    <main>
        <h2>Explore Now</h2>
        <a href="{{ url_for('explore') }}" class="cta-button">Start Your Journey</a>
    </main>

    <!-- Support Widget -->
    <div class="support-widget">
        <p>💬 Need Help? Contact Support</p>
    </div>
</body>
</html>
